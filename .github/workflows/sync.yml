name: Sync to Local Device

on:
  push:
    branches: [ "main" ]

jobs:
  sync:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # Updated to v4 to match deploy.yml and resolve IDE resolution error
        with:
          path: website-content

      - name: Deploy to Target Folder
        run: |
          xcopy /E /Y /I website-content\* "C:\Users\catnolan_senoiahisto\MyWebsite"
